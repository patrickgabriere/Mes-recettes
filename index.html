<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Grimoire des Parents</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #fdf6ec; --brown: #3d2b1f; --orange: #e8672a; --gold: #c9a84c; --gray: #f0ebe3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--brown); min-height: 100vh; }
        header { background: var(--brown); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 100; }
        .tabs { display: flex; max-width: 1000px; margin: 20px auto 0; padding: 0 20px; }
        .tab { padding: 12px 25px; cursor: pointer; background: var(--gray); border-radius: 10px 10px 0 0; margin-right: 5px; border: 1px solid #ddd; border-bottom: none; }
        .tab.active { background: white; font-weight: bold; border-top: 3px solid var(--orange); }
        .main-content { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .section-page { display: none; background: white; padding: 30px; border-radius: 0 15px 15px 15px; border: 2px solid #e0d8cc; }
        .section-page.active { display: block; }
        .grille { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .recette-card { background: white; border: 1px solid var(--gray); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .recette-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .recette-card img { width: 100%; height: 150px; object-fit: cover; }
        .recette-card-body { padding: 15px; }
        .input-group { margin-bottom: 20px; }
        input[type="text"], select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--gray); }
        .btn-save { width: 100%; padding: 15px; background: var(--orange); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        /* MODALE */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; }
        .modal-content { background: white; margin: 5vh auto; padding: 30px; width: 90%; max-width: 600px; border-radius: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        .modal-close { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

<header>
    <h1>📖 Le Grimoire</h1>
    <div id="section-auth">
        <button id="btn-login" onclick="window.connexionGoogle()">Connexion Google</button>
        <div id="info-user" style="display:none;">
            <span id="txt-user"></span>
            <button onclick="window.deconnexion()">Déconnexion</button>
        </div>
    </div>
</header>

<div class="tabs">
    <div class="tab active" onclick="window.changerOnglet('communaute', this)">🌍 Communauté</div>
    <div class="tab" onclick="window.changerOnglet('mes-recettes', this)">📚 Mes Recettes</div>
    <div class="tab" onclick="window.changerOnglet('ajouter', this)">➕ Ajouter</div>
</div>

<div class="main-content">
    <div id="page-communaute" class="section-page active">
        <input type="text" id="recherche" placeholder="🔎 Rechercher une recette..." style="width:100%; padding:15px; border-radius:12px; border:2px solid #eee;" oninput="window.rechercherParNom()">
        <div id="liste-cuisine" class="grille"></div>
        <div id="liste-patisserie" class="grille"></div>
    </div>

    <div id="page-mes-recettes" class="section-page">
        <div id="liste-mes-recettes" class="grille"></div>
    </div>

    <div id="page-ajouter" class="section-page">
        <div class="input-group"><label>Nom de la recette</label><input type="text" id="nom"></div>
        <div class="input-group">
            <label>🛒 Ingrédients</label>
            <div id="liste-ingredients-input"></div>
            <button onclick="window.ajouterChamp('liste-ingredients-input', 'ingredient-item')">+ Ingrédient</button>
        </div>
        <div class="input-group">
            <label>👨‍🍳 Étapes</label>
            <div id="liste-etapes-input"></div>
            <button onclick="window.ajouterChamp('liste-etapes-input', 'etape-item')">+ Étape</button>
        </div>
        <div class="input-group">
            <select id="univers" onchange="window.majSousCategories()">
                <option value="cuisine">Cuisine</option>
                <option value="pâtisserie">Pâtisserie</option>
            </select>
            <select id="sousCategorie" style="margin-top:10px;"></select>
        </div>
        <button class="btn-save" onclick="window.ajouterRecette()">Enregistrer</button>
    </div>
</div>

<div id="modalRecette" class="modal">
    <div class="modal-content">
        <span class="modal-close" onclick="window.fermerRecette()">&times;</span>
        <div id="contenuRecette"></div>
    </div>
</div>

</body>
</html>
